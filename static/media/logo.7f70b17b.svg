<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 900 900">
  <defs>
    <style>
      @keyframes rotate {
        from {transform: rotate(105deg);}
        to {transform: rotate(465deg);}
      }

      .rotating {
        animation-name: rotate;
        animation-duration: 1200ms;
        animation-iteration-count: infinite;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: 300px 300px;
        transform: rotate(10, 300, 300);
        stroke: url(#Pattern);
      }
    </style>
    <linearGradient id="Gradient1" gradientTransform="rotate(90)">
      <stop offset="0%" stop-color="rgba(0, 0, 51, 0.8)"/>
      <stop offset="100%" stop-color="rgba(0, 0, 51, 0.5)"/>
    </linearGradient>
    <linearGradient id="Gradient2" gradientTransform="rotate(90)">
      <stop offset="0%" stop-color="rgba(0, 0, 51, 0)" stop-opacity="0"/>
      <stop offset="90%" stop-color="rgba(0, 0, 51, 0.5)"/>
      <stop offset="100%" stop-color="rgba(0, 0, 51, 0.65)"/>
    </linearGradient>
    <pattern id="Pattern" x="0" y="0" width="600" height="600" patternUnits="userSpaceOnUse">
      <g transform="rotate(0, 300, 300)">
        <rect shape-rendering="crispEdges" x="0" y="0" width="300" height="600" fill="url(#Gradient1)"/>
        <rect shape-rendering="crispEdges"  x="300" y="0" width="300" height="600" fill="url(#Gradient2)"/>
      </g>
    </pattern>
  </defs>
  <g transform="translate(150, 150)">
    <path class="rotating" fill="transparent" stroke-width="80" d="M 364 58 A 250 250 0 1 1 235 58"/>
  </g>
</svg>
